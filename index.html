<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-user Chat</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
        }

        .chat {
            max-width: 800px;
            height: 90vh;
            margin: 20px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 16px 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .topbar {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .topbar input {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
        }

        #username {
            width: 180px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f9fafb;
        }

        .msg {
            margin: 10px 0;
            padding: 10px 14px;
            border-radius: 12px;
            background: #e5e7eb;
            width: fit-content;
            max-width: 75%;
            word-wrap: break-word;
        }

        .system {
            background: #dbeafe;
            color: #1e3a8a;
        }

        .meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .inputBox {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        #messageText {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">Multi-user FastAPI Chat</div>

        <div class="topbar">
            <input id="username" type="text" placeholder="Tvoje meno" value="User">
        </div>

        <div id="messages" class="messages"></div>

        <div class="inputBox">
            <input id="messageText" type="text" placeholder="Napíš správu..." autocomplete="off">
            <button onclick="sendMessage()">Odoslať</button>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);
        const messages = document.getElementById("messages");
        const messageInput = document.getElementById("messageText");
        const usernameInput = document.getElementById("username");

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            const item = document.createElement("div");
            item.className = "msg" + (data.type === "system" ? " system" : "");

            const meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = data.type === "system"
                ? "Systém"
                : `${data.username} • ${data.time}`;

            const text = document.createElement("div");
            text.textContent = data.message;

            item.appendChild(meta);
            item.appendChild(text);
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        };

        ws.onclose = function() {
            const item = document.createElement("div");
            item.className = "msg system";
            item.textContent = "Pripojenie bolo ukončené.";
            messages.appendChild(item);
        };

        function sendMessage() {
            const username = usernameInput.value.trim() || "User";
            const message = messageInput.value.trim();

            if (!message) return;

            ws.send(JSON.stringify({
                username: username,
                message: message
            }));

            messageInput.value = "";
            messageInput.focus();
        }

        messageInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
